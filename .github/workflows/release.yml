name: Release Plugin

on:
  push:
    paths:
    - "manifest.json"

permissions:
  contents: write

env:
  PLUGIN_NAME: FiletreeCleaner
  TARGET_ABI: "10.11.0.0"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install jq and yq
      run: |
        sudo apt-get update && sudo apt-get install -y jq
        sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

    - name: Read version and changelog from manifest
      run: |
        VERSION=$(jq -r '.[0].versions[0].version' manifest.json)
        CHANGELOG=$(jq -r '.[0].versions[0].changelog' manifest.json)
        
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        echo "CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$CHANGELOG" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Restore
      run: dotnet restore

    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Publish plugin
      run: |
        dotnet publish Jellyfin.Plugin.FiletreeCleaner/Jellyfin.Plugin.FiletreeCleaner.csproj \
          -c Release \
          -o ./publish \
          -p:Version=${VERSION} \
          -p:AssemblyVersion=${VERSION}.0 \
          -p:FileVersion=${VERSION}.0 \
          -p:InformationalVersion=${VERSION}

    - name: Create package
      run: |
        mkdir package
        cp publish/*.dll package/
        cp publish/*.pdb package/ 2>/dev/null || true
        cd package
        zip ../${PLUGIN_NAME}_${VERSION}.zip *
        cd ..

    - name: Generate checksum
      id: checksum
      run: |
        md5sum ${PLUGIN_NAME}_${VERSION}.zip | cut -d ' ' -f1 > checksum.txt
        echo "CHECKSUM=$(cat checksum.txt)" >> $GITHUB_ENV

    - name: Update manifest metadata
      run: |
        DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${PLUGIN_NAME}_${VERSION}.zip"

        jq --arg checksum "$CHECKSUM" \
           --arg url "$DOWNLOAD_URL" \
           '
           .[0].versions[0].checksum = $checksum |
           .[0].versions[0].timestamp = (now | todateiso8601) |
           .[0].versions[0].sourceUrl = $url
           ' manifest.json > manifest.tmp

        mv manifest.tmp manifest.json

    - name: Update build.yaml
      run: |
        yq eval -i '
          .version = strenv(VERSION) |
          .targetAbi = strenv(TARGET_ABI) |
          .framework = "net9.0" |
          .changelog = strenv(CHANGELOG)
        ' build.yaml

    - name: Print build.yaml
      run: |
        echo "Updated build.yaml:"
        cat build.yaml

    - name: Commit updated files
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add manifest.json build.yaml
        git commit -m "Update metadata for $VERSION" || echo "No changes"
        git push origin HEAD:main

    - name: Create tag
      run: |
        git tag $VERSION
        git push origin $VERSION

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        files: ${{ env.PLUGIN_NAME }}_${{ env.VERSION }}.zip
